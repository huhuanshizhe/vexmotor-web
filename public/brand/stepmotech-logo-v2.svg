<svg xmlns="http://www.w3.org/2000/svg" width="440" height="104" viewBox="0 0 440 104" role="img" aria-labelledby="title desc">
  <title id="title">StepMotech Logo</title>
  <desc id="desc">StepMotech modern industrial wordmark with motion pulse icon.</desc>
  <defs>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D4A7B"/>
      <stop offset="1" stop-color="#1180C4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E45A0F"/>
      <stop offset="1" stop-color="#FF7A26"/>
    </linearGradient>
  </defs>

  <g transform="translate(4 6)">
    <rect x="0" y="10" width="88" height="72" rx="20" fill="#08253F"/>
    <path d="M18 58h14l7-16 9 24 8-18h14" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="18" cy="58" r="4" fill="#FF9A55"/>
    <circle cx="70" cy="48" r="4" fill="#FF9A55"/>
    <rect x="10" y="20" width="68" height="52" rx="14" fill="none" stroke="url(#pulse)" stroke-width="2" opacity="0.85"/>
  </g>

  <g transform="translate(106 20)">
    <text x="0" y="34" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="1.2" fill="#0A2D4D">STEPMO</text>
    <text x="198" y="34" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="1.2" fill="#E45A0F">TECH</text>
    <text x="1" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="1.6" fill="#2E4C68">PRECISION MOTION COMPONENTS</text>
  </g>
</svg>
